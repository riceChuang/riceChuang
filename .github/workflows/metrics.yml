name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Highlights card — repos count, stars, followers, lines of code
      - name: Highlights
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.highlights.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: riceChuang
          template: classic
          base: header, repositories
          base_indepth: yes
          config_timezone: Asia/Taipei
          config_padding: 0, 4 + 6%

          # Lines of code added / removed across all repos
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_sections: base

          # Followup — issue / PR ratio
          plugin_followup: yes
          plugin_followup_sections: user

      # 2. Yearly contribution calendar (daily commit heatmap)
      - name: Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: riceChuang
          base: ""
          config_timezone: Asia/Taipei
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
