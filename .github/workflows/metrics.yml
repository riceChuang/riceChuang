name: Metrics

on:
  # Daily refresh
  schedule:
    - cron: "0 0 * * *"
  # Run on every push to main
  push:
    branches: ["main"]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Output filename — referenced as ./metrics.svg in README
          filename: metrics.svg

          # Personal access token with repo + read:user scope.
          # Create one at https://github.com/settings/tokens, then add as
          # repo secret named METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}

          # User to render
          user: riceChuang

          # Visual
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Taipei
          config_padding: 0, 4 + 6%

          # Plugin: language breakdown (uses local data, doesn't depend on vercel)
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # Plugin: most active hours / days
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_from: 200
          plugin_habits_days: 14

          # Plugin: lines of code added / removed
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_sections: base

          # Plugin: followup (issues / PRs ratio)
          plugin_followup: yes
          plugin_followup_sections: repositories
